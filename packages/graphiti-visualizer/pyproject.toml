[project]
name = "graphiti-visualizer"
version = "0.1.0"
description = "Web-based knowledge graph visualizer for Graphiti"
requires-python = ">=3.11"
dependencies = ["fastapi"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["graphiti_visualizer"]
artifacts = ["graphiti_visualizer/static/*"]
